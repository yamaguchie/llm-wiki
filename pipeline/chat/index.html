<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title id="page-title">Agentic Search チャット</title>
<style>
:root{--bg:#f6f7f9;--fg:#1b1f24;--card:#fff;--line:#e2e6ea;--accent:#2b6cb0;--muted:#667;--user:#2b6cb0;--bot:#eef2f7;--trace:#fbfaf5;--warn:#b7791f;--ok:#2f855a}
@media(prefers-color-scheme:dark){:root{--bg:#14181d;--fg:#e6e9ec;--card:#1c2127;--line:#2c333b;--accent:#63b3ed;--muted:#98a2b3;--user:#2c5282;--bot:#232a32;--trace:#1a1f18;--warn:#d69e2e;--ok:#68d391}}
*{box-sizing:border-box}
body{margin:0;font-family:system-ui,-apple-system,"Segoe UI","Hiragino Kaku Gothic ProN",Meiryo,sans-serif;background:var(--bg);color:var(--fg);line-height:1.6}
.layout{display:flex;height:calc(100vh - 72px);overflow:hidden}
.topnav{box-sizing:border-box;display:flex;align-items:center;gap:4px;padding:4px 10px;background:var(--card);border-bottom:1px solid var(--line);overflow-x:auto;flex-wrap:wrap;min-height:36px}
.topnav .navbrand{font-weight:700;font-size:.85rem;margin-right:2px;flex:0 0 auto}
.topnav a.navbtn{flex:0 0 auto;font-size:.75rem;text-decoration:none;color:var(--fg);border:1px solid var(--line);border-radius:6px;padding:2px 7px;background:var(--bg)}
.topnav a.navbtn:hover{border-color:var(--accent);color:var(--accent)}
.topnav a.navbtn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.topnav .navspacer{flex:1 1 auto}
.topnav .navsep{color:var(--muted);font-size:.6rem;flex:0 0 auto;margin:0 1px}
.topnav .navstep{font-weight:600;font-size:.7rem;color:var(--muted);flex:0 0 auto}
.left{flex:1;display:flex;flex-direction:column;min-width:0;border-right:1px solid var(--line)}
.right{width:420px;min-width:280px;display:flex;flex-direction:column;background:var(--card)}
.right h3{font-size:.85rem;margin:8px 12px 4px;color:var(--muted)}
.right svg{flex:1;width:100%;min-height:0}
.chat-area{flex:1;overflow-y:auto;padding:12px}
.input-area{padding:8px 12px;border-top:1px solid var(--line);background:var(--card)}
header h1{font-size:1.1rem;margin:0 0 2px;padding:0 12px}
header p{color:var(--muted);font-size:.78rem;margin:0 12px 6px}
.chips{display:flex;flex-wrap:wrap;gap:4px;margin:0 12px 6px}
.chip{border:1px solid var(--line);background:var(--card);color:var(--fg);border-radius:999px;padding:3px 9px;font-size:.75rem;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:180px}
.chip:hover{border-color:var(--accent);color:var(--accent)}
#log{display:flex;flex-direction:column;gap:8px}
.msg{max-width:95%;padding:8px 11px;border-radius:10px;font-size:.85rem;white-space:normal}
.me{align-self:flex-end;background:var(--user);color:#fff;border-bottom-right-radius:3px}
.bot{align-self:flex-start;background:var(--bot);border:1px solid var(--line);border-bottom-left-radius:3px}
.bot h3{margin:.1em 0 .3em;font-size:.9rem}
.bot ul{margin:.2em 0;padding-left:1.1em}
.bot li{margin:.2em 0}
.badge{display:inline-block;font-size:.68rem;padding:1px 6px;border-radius:999px;border:1px solid var(--line);margin-left:4px;vertical-align:middle}
.badge.inc{color:var(--warn);border-color:var(--warn)}
.badge.free{color:var(--ok);border-color:var(--ok)}
.src{font-size:.7rem;color:var(--muted);margin-top:2px}
.src a{color:var(--accent);text-decoration:none}
.warnline{color:var(--warn);font-size:.75rem}
details.trace{align-self:flex-start;max-width:95%;background:var(--trace);border:1px dashed var(--line);border-radius:8px;padding:6px 10px;font-size:.76rem;color:var(--muted)}
details.trace summary{cursor:pointer;font-weight:600;font-size:.8rem;padding:2px 0}
.step{margin:4px 0;padding:3px 5px 3px 8px;border-left:3px solid var(--line);border-radius:0 3px 3px 0}
.step b{color:var(--fg)}
.tnode{display:inline-block;font-size:.68rem;background:var(--card);border:1px solid var(--line);border-radius:4px;padding:0 5px;margin-right:3px;font-weight:600}
.touch-list{display:flex;flex-wrap:wrap;gap:2px;margin-top:2px}
.touch-item{font-size:.68rem;background:var(--card);border:1px solid var(--line);border-radius:3px;padding:0 5px;color:var(--fg)}
.inrow{display:flex;gap:6px}
#q{flex:1;padding:8px 10px;border:1px solid var(--line);border-radius:8px;background:var(--card);color:var(--fg);font-size:.85rem}
#send{padding:8px 14px;border:0;border-radius:8px;background:var(--accent);color:#fff;font-weight:600;cursor:pointer;font-size:.85rem}
.gmode-label{font-size:.78rem;margin:4px 0;display:flex;align-items:center;gap:4px;cursor:pointer}
.gmode-label input{cursor:pointer}
.graph-tooltip{position:fixed;background:#333;color:#fff;padding:4px 8px;border-radius:4px;font-size:11px;pointer-events:none;z-index:100;max-width:260px;white-space:nowrap}
</style>
</head>
<body>
<nav class="topnav">
  <span class="navbrand">🧭 GraphRAG</span>
  <a class="navbtn active" href="/">💬 チャット</a>
  <span class="navsep">│</span>
  <span class="navstep">Step1 データクレンジング</span>
  <a class="navbtn" href="/review/raw">1.1 RAWデータ</a>
  <a class="navbtn" href="/review/llmwiki">1.2 LLM-Wiki</a>
  <span class="navsep">│</span>
  <span class="navstep">Step2 ドメイン知識の付与</span>
  <a class="navbtn" href="/review/cq">2.1 QA</a>
  <a class="navbtn" href="/review/ontology-def">2.2 オントロジー定義</a>
  <a class="navbtn" href="/review/ontology-graph">2.3 オントロジー図</a>
  <span class="navsep">│</span>
  <span class="navstep">Step3 ナレッジグラフ（GraphRAG）</span>
  <a class="navbtn" href="/review/kg">3.1 ナレッジグラフ</a>
  <a class="navbtn" href="/review/validation">3.2 QAのAgent回帰テスト</a>
  <span class="navspacer"></span>
  <button id="pipeline-btn" onclick="runPipeline()" title="1.2→2.1→2.2→3.1→3.2 を一括実行" style="padding:5px 12px;border:none;border-radius:5px;background:var(--accent);color:#fff;font-weight:700;cursor:pointer;font-size:.75rem">▶ 全行程実行</button>
  <span id="pipeline-status" style="font-size:.7rem;color:var(--muted);margin-left:4px"></span>
</nav>
<div class="layout">
  <div class="left">
    <header>
      <h1 id="page-h1">Agentic Search</h1>
      <p>KG(<b id="ncount"></b>ノード/<b id="ecount"></b>エッジ) 反復検索デモ</p>
    </header>
    <div class="chips" id="chips"></div>
    <div class="chat-area" id="chat-area">
      <div id="log"></div>
    </div>
    <div class="input-area">
      <div class="inrow">
        <input id="q" placeholder="質問を入力…" autocomplete="off">
        <button id="send">送信</button>
      </div>
    </div>
  </div>
  <div class="right">
    <h3>🔍 参照グラフ <span id="graph-info" style="font-weight:400;font-size:.75rem;color:var(--muted)"></span></h3>
    <svg id="graph-svg"></svg>
  </div>
</div>
<script>
const KG = {"nodes": [], "edges": []};  // 初期値。起動後に /api/kg/neo4j から動的に上書きされる
const REVIEW = '';   // 統合サーバ(8790)により同一オリジン。/api/* を直接呼ぶ
let CHAT_LABELS = {classes:{}, relationships:{}};   // 物理名→日本語論理名
function clsJa(name){ const l=CHAT_LABELS.classes[name]; return l?`${l}（${name}）`:(name||''); }
let GKG = KG;                              // 右ペインに描画するグラフ（起動時に3.1 KGへ差替）
let N = {}; KG.nodes.forEach(n=>N[n.id]=n);
let E = KG.edges;
document.getElementById('ncount').textContent = KG.nodes.length;
document.getElementById('ecount').textContent = E.length;

// ---------- graph helpers ----------
const P = id => (N[id]?N[id].props:{});
function _primaryLabel(n) { return n.labels[n.labels.length - 1]; }
function _nodeName(n) { return n.props.name || n.props.dept || n.id; }

function buildGraph() {
  const svg = document.getElementById('graph-svg');
  const W = 400, H = 400;
  svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
  while (svg.firstChild) svg.removeChild(svg.firstChild);

  _graph.nodeMap = {};
  _graph.nodes = GKG.nodes.map(n => {
    const r = Math.max(8, Math.min(20, 20 - _nodeName(n).length * 0.25));
    const obj = { id: n.id, label: _primaryLabel(n), name: _nodeName(n),
      x: W/2 + (Math.random()-0.5)*W*0.5, y: H/2 + (Math.random()-0.5)*H*0.5, vx: 0, vy: 0, r };
    _graph.nodeMap[n.id] = obj;
    return obj;
  });
  _graph.edges = GKG.edges.map(e => ({ a: _graph.nodeMap[e.from], b: _graph.nodeMap[e.to], type: e.type }));
  _graph.highlight = new Set();

  // Defs
  const defs = document.createElementNS('http://www.w3.org/2000/svg', 'defs');
  svg.appendChild(defs);
  const marker = document.createElementNS('http://www.w3.org/2000/svg', 'marker');
  marker.setAttribute('id', 'g-arrow'); marker.setAttribute('markerWidth', '6'); marker.setAttribute('markerHeight', '6');
  marker.setAttribute('refX', '6'); marker.setAttribute('refY', '3'); marker.setAttribute('orient', 'auto');
  const ap = document.createElementNS('http://www.w3.org/2000/svg', 'path');
  ap.setAttribute('d', 'M0,0 L6,3 L0,6 Z'); ap.setAttribute('fill', '#ccc');
  marker.appendChild(ap); defs.appendChild(marker);

  _graph.edgeGroup = document.createElementNS('http://www.w3.org/2000/svg', 'g');
  svg.appendChild(_graph.edgeGroup);
  _graph.nodeGroup = document.createElementNS('http://www.w3.org/2000/svg', 'g');
  svg.appendChild(_graph.nodeGroup);

  // Force simulation
  for (let i = 0; i < 150; i++) {
    for (const n of _graph.nodes) {
      n.vx += (W/2 - n.x) * 0.003; n.vy += (H/2 - n.y) * 0.003;
      for (const o of _graph.nodes) {
        if (n === o) continue;
        let dx = n.x - o.x, dy = n.y - o.y;
        let dist = Math.sqrt(dx*dx + dy*dy) || 1;
        let f = 2000 / (dist * dist);
        n.vx += (dx/dist) * f; n.vy += (dy/dist) * f;
      }
    }
    for (const e of _graph.edges) {
      if (!e.a || !e.b) continue;
      const dx = e.b.x - e.a.x, dy = e.b.y - e.a.y;
      const dist = Math.sqrt(dx*dx + dy*dy) || 1;
      const f = (dist - (e.a.r + e.b.r + 30)) * 0.002;
      e.a.vx += (dx/dist) * f; e.a.vy += (dy/dist) * f;
      e.b.vx -= (dx/dist) * f; e.b.vy -= (dy/dist) * f;
    }
    for (const n of _graph.nodes) {
      n.vx *= 0.85; n.vy *= 0.85; n.x += n.vx; n.y += n.vy;
      n.x = Math.max(n.r, Math.min(W - n.r, n.x));
      n.y = Math.max(n.r, Math.min(H - n.r, n.y));
    }
  }
  renderGraph();
}

function renderGraph() {
  const hl = _graph.highlight;
  // Edges
  _graph.edgeGroup.innerHTML = '';
  for (const e of _graph.edges) {
    if (!e.a || !e.b) continue;
    const hlEdge = hl.has(e.a.id) && hl.has(e.b.id);
    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    line.setAttribute('x1', e.a.x); line.setAttribute('y1', e.a.y);
    line.setAttribute('x2', e.b.x); line.setAttribute('y2', e.b.y);
    line.setAttribute('stroke', hlEdge ? '#e74c3c' : '#e0e0e0');
    line.setAttribute('stroke-width', hlEdge ? '1.5' : '0.4');
    line.setAttribute('marker-end', hlEdge ? 'url(#g-arrow)' : '');
    _graph.edgeGroup.appendChild(line);
  }
  // Nodes
  _graph.nodeGroup.innerHTML = '';
  for (const n of _graph.nodes) {
    const step = (hl instanceof Map) ? hl.get(n.id) : undefined;
    const hlNode = hl.has(n.id);
    const c = _labelColor[n.label] || '#999';
    const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    g.setAttribute('transform', `translate(${n.x},${n.y})`);
    g.style.opacity = hlNode ? '1' : '0.2';
    g.style.cursor = 'pointer';
    g.addEventListener('click', () => { showNodeDetail(n.id); });

    const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    circle.setAttribute('r', hlNode ? n.r + 2 : n.r);
    circle.setAttribute('fill', hlNode ? c + '90' : '#eee');
    circle.setAttribute('stroke', hlNode ? c : '#ddd');
    circle.setAttribute('stroke-width', hlNode ? '2' : '0.5');
    g.appendChild(circle);

    if (hlNode) {
      // Step badge (top-right corner)
      const badge = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
      const br = 8;
      badge.setAttribute('cx', n.r * 0.5); badge.setAttribute('cy', -n.r * 0.5);
      badge.setAttribute('r', br);
      badge.setAttribute('fill', '#e74c3c');
      badge.setAttribute('stroke', '#fff');
      badge.setAttribute('stroke-width', '1.5');
      g.appendChild(badge);

      const stepText = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      stepText.setAttribute('x', n.r * 0.5); stepText.setAttribute('y', -n.r * 0.5 + 3);
      stepText.setAttribute('text-anchor', 'middle');
      stepText.setAttribute('font-size', '8');
      stepText.setAttribute('font-weight', 'bold');
      stepText.setAttribute('fill', '#fff');
      stepText.textContent = CIRCLED[(step - 1) % CIRCLED.length] || step;
      g.appendChild(stepText);

      const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      text.setAttribute('text-anchor', 'middle'); text.setAttribute('y', '3');
      text.setAttribute('font-size', '7'); text.setAttribute('font-weight', 'bold');
      text.setAttribute('fill', '#333');
      const short = n.name.length > 8 ? n.name.slice(0, 8) + '…' : n.name;
      text.textContent = short;
      g.appendChild(text);
    }

    _graph.nodeGroup.appendChild(g);
  }
  document.getElementById('graph-info').textContent = hl.size ? `(${hl.size}ノード)` : '';
}

function showNodeDetail(id) {
  const tip = document.getElementById('graph-tooltip') || (() => {
    const el = document.createElement('div'); el.id = 'graph-tooltip'; el.className = 'graph-tooltip';
    document.body.appendChild(el); return el;
  })();
  const n = _graph.nodeMap[id];
  if (!n) return;
  const p = P(id);
  tip.textContent = `${n.name} [${clsJa(n.label)}]${p.phone ? ' ☎' + p.phone : ''}${p.dept ? ' — ' + p.dept : ''}`;
  tip.style.display = 'block';
}
document.addEventListener('mousemove', e => {
  const tip = document.getElementById('graph-tooltip');
  if (tip) { tip.style.left = (e.clientX + 12) + 'px'; tip.style.top = (e.clientY - 10) + 'px'; }
});
document.addEventListener('mouseover', e => {
  const tip = document.getElementById('graph-tooltip');
  if (tip && !e.target.closest('#graph-svg')) tip.style.display = 'none';
});


// ---------- UI ----------
const log=document.getElementById('log');
function bubble(cls,html){const d=document.createElement('div');d.className='msg '+cls;d.innerHTML=html;log.appendChild(d);d.scrollIntoView({behavior:'smooth',block:'end'});return d;}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function mdToHtml(md){
  const lines=(md||'').split('\n'); let html='',inList=false;
  const pdfBase = '/r7syogaisyahukusinotebiki_shusei.pdf';
  const inline = s => {
    let r = esc(s);
    r = r.replace(/\*\*(.+?)\*\*/g, '<b>$1</b>');
    r = r.replace(/\[([^\]]+)\]\(pages\/([\w-]+\.md)\)/g, '<a href="/pages/$2">$1</a>');
    r = r.replace(/wiki:\s*(pages\/[\w-]+\.md)/g, '<a href="/$1">$1</a>');
    r = r.replace(/(?<!["=])pages\/([\w-]+\.md)/g, '<a href="/pages/$1">pages/$1</a>');
    r = r.replace(/\(p\.(\d+)\)/g, '<a href="' + pdfBase + '#page=$1" target="_blank">(p.$1)</a>');
    return r;
  };
  for(const raw of lines){
    const line=raw.replace(/\s+$/,'');
    if(/^\s*[-*]\s+/.test(line)){ if(!inList){html+='<ul>';inList=true;} html+='<li>'+inline(line.replace(/^\s*[-*]\s+/,''))+'</li>'; continue; }
    if(inList){html+='</ul>';inList=false;}
    if(/^#{1,6}\s+/.test(line)){ html+='<h3>'+inline(line.replace(/^#{1,6}\s+/,''))+'</h3>'; continue; }
    if(/^---+$/.test(line)){ html+='<hr style="border:0;border-top:1px solid var(--line);margin:8px 0">'; continue; }
    if(line.trim()===''){ html+='<div style="height:4px"></div>'; continue; }
    html+='<div>'+inline(line)+'</div>';
  }
  if(inList)html+='</ul>';
  return html;
}


async function ask(q){
  if(!q||!q.trim())return;
  bubble('me',esc(q));
  const pend=bubble('bot','⏳ 4手法（ナイーブRAG / LLM-Wiki検索 / KGのみ / KG+Wiki補完）で回答生成中…（20秒程度）');
  try{
    const r=await fetch(REVIEW+'/api/validation/ask',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({query:q})});
    const d=await r.json();
    pend.remove();
    if(!d.ok){ bubble('bot','<div class="warnline">⚠ '+esc(d.error||'回答生成に失敗しました')+'</div>'); return; }
    const ids=(d.subgraph&&d.subgraph.node_ids)||[];
    const eN=(d.subgraph&&d.subgraph.edges)?d.subgraph.edges.length:0;
    _graph.highlight=new Set(ids); renderGraph();
    document.getElementById('graph-info').textContent = ids.length?`(参照 ${ids.length}ノード / ${eN}関係)`:'';
    bubble('bot', threeColHtml(d));
  }catch(e){
    pend.remove();
    bubble('bot','<div class="warnline">⚠ 通信エラー: '+esc(String(e))+'</div><div style="font-size:.72rem;color:var(--muted)">レビューUI(8790)が起動しているか確認してください。</div>');
  }
}

function threeColHtml(d){
  const pdfBase='/r7syogaisyahukusinotebiki_shusei.pdf';
  const naiveSrc=(d.naive&&d.naive.rag_sources&&d.naive.rag_sources.length)
    ? '<div style="font-size:.7rem;color:var(--muted);margin-top:5px">出典: '+d.naive.rag_sources.map(s=>`<a href="${pdfBase}#page=${s.page}" target="_blank" style="color:var(--accent);text-decoration:none">p.${s.page}</a>`).join(', ')+'</div>' : '';
  const col=(label,color,ans,extra)=>`<div style="flex:1;min-width:240px;background:var(--bot);border:1px solid var(--line);border-radius:10px;padding:10px">
    <div style="font-size:.82rem;font-weight:700;margin-bottom:6px;color:${color}">${label}</div>
    <div style="font-size:.88rem">${mdToHtml(ans||'（回答なし）')}</div>${extra||''}</div>`;
  const ents=(d.entities||[]).map(esc).join('、');
  const srcs=(d.sources||[]).map(esc).join('、');
  const traceHtml=(d.trace||[]).map(t=>`[${esc(t.node)}] ${esc(t.txt)}`).join('<br>');
  const wa = d.wikiagent;
  const waSrc = wa && wa.pages_visited && wa.pages_visited.length
    ? '<div style="font-size:.7rem;color:var(--muted);margin-top:5px">探索: '+wa.pages_visited.map(esc).join(' → ')+'</div>' : '';
  return `<div style="display:flex;gap:10px;flex-wrap:wrap">
    ${col('🔍 ナイーブRAG（PDF直接検索）','#9b59b6', d.naive&&d.naive.answer, naiveSrc)}
    ${col('📖 LLM-Wiki検索（Agentic）','#16a34a', wa&&wa.answer, waSrc)}
    ${col('🗄 KGのみ（3.1ナレッジグラフ）','#e67e22', d.kg&&d.kg.answer)}
    ${col('🗄+📄 KG+Wiki補完','#2563eb', d.kgwiki&&d.kgwiki.answer)}
  </div>
  <details class="trace" style="margin-top:8px"><summary>🧩 検索したエンティティ / 参照Wiki / エージェント経路</summary>
    <div style="font-size:.78rem;margin-top:5px"><b>検索エンティティ(${(d.entities||[]).length}):</b> ${ents||'—'}</div>
    <div style="font-size:.78rem;margin-top:2px"><b>参照Wiki:</b> ${srcs||'—'}</div>
    <div style="font-size:.78rem;margin-top:2px"><b>LLM-Wiki検索(W)が探索したページ:</b> ${(wa&&wa.pages_visited||[]).map(esc).join('、')||'—'}</div>
    <div style="font-size:.72rem;color:var(--muted);margin-top:5px;font-family:monospace">${traceHtml}</div>
  </details>`;
}

document.getElementById('send').onclick=()=>{const i=document.getElementById('q');ask(i.value);i.value='';};
document.getElementById('q').addEventListener('keydown',e=>{if(e.key==='Enter'){document.getElementById('send').click();}});

// 上部チップ = 承認済みCQ（クリックで即送信）
fetch(REVIEW+'/api/validation/cqs').then(r=>r.json()).then(cqs=>{
  const chips=document.getElementById('chips'); chips.innerHTML='';
  if(!cqs||!cqs.length){ chips.innerHTML='<span style="font-size:.72rem;color:var(--muted)">承認済みCQがありません（2.1 CQ画面で承認してください）</span>'; return; }
  const lbl=document.createElement('span'); lbl.style.cssText='font-size:.7rem;color:var(--muted);align-self:center;margin-right:2px'; lbl.textContent='CQ（承認済・クリックで質問）:'; chips.appendChild(lbl);
  cqs.forEach(cq=>{const b=document.createElement('button');b.className='chip';b.textContent=cq.title;if(cq.expected_answer)b.title='正解: '+cq.expected_answer;b.onclick=()=>ask(cq.title);chips.appendChild(b);});
}).catch(()=>{});

bubble('bot','こんにちは。質問すると <b>🔍ナイーブRAG</b> / <b>📖LLM-Wiki検索（Agentic）</b> / <b>🗄KGのみ（3.1ナレッジグラフ）</b> / <b>🗄+📄KG+Wiki補完</b> の4手法で回答し比較します。右のグラフは3.1ナレッジグラフで、回答に使ったエンティティと関係をハイライトします。上の承認済みCQをクリックするか、自由に入力してください。');

fetch(REVIEW+'/api/ontology/labels').then(r=>r.json()).then(l=>{ if(l&&l.classes) CHAT_LABELS=l; }).catch(()=>{});

// 画面タイトル/見出しは .env の KB_TITLE から取得（別プロジェクトへforkしても.envの変更だけで済むように）
fetch(REVIEW+'/api/meta').then(r=>r.json()).then(m=>{

// 右ペインを 3.1 ナレッジグラフ(Neo4j) に差し替えて描画
fetch(REVIEW+'/api/kg/neo4j').then(r=>r.json()).then(kg=>{
  if(kg&&kg.nodes&&kg.nodes.length){
    GKG={nodes:kg.nodes,edges:kg.edges||[]};
    N={}; GKG.nodes.forEach(n=>N[n.id]=n);
    E=GKG.edges;
    _allLabels=[...new Set(GKG.nodes.flatMap(n=>n.labels||[]))];
    _labelColor={}; _allLabels.forEach((l,i)=>{_labelColor[l]=_palette[i%_palette.length];});
    document.getElementById('ncount').textContent=GKG.nodes.length;
    document.getElementById('ecount').textContent=GKG.edges.length;
  }
  buildGraph();
}).catch(()=>{ buildGraph(); });

async function runPipeline(){
  const btn=document.getElementById('pipeline-btn');
  const st=document.getElementById('pipeline-status');
  if(btn.disabled)return;
  btn.disabled=true; btn.textContent='⏳';
  st.textContent='開始…';
  try{
    const r=await fetch('/api/pipeline/run-all',{method:'POST'});
    const d=await r.json();
    if(!d.ok){ st.textContent='⚠ エラー'; btn.disabled=false; btn.textContent='▶ 全行程実行'; return; }
    const tid=d.task_id;
    const int=setInterval(async()=>{
      const pr=await(await fetch('/api/task/'+tid)).json();
      const pct=Math.round(pr.progress/pr.total*100);
      st.textContent=(pr.msg||'')+' '+pct+'%';
      if(pr.status==='done'){ st.textContent='✅ 完了'; clearInterval(int); btn.disabled=false; btn.textContent='▶ 全行程実行'; }
      if(pr.status==='error'){ st.textContent='⚠ '+((pr.error||'エラー').slice(0,30)); clearInterval(int); btn.disabled=false; btn.textContent='▶ 全行程実行'; }
    },2000);
  }catch(e){ st.textContent='⚠ 通信エラー'; btn.disabled=false; btn.textContent='▶ 全行程実行'; }
}
