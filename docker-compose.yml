services:
  # ── Neo4j データベース ──
  neo4j:
    image: neo4j:2025.10-community
    container_name: bunkyo-neo4j
    ports:
      - "7687:7687"   # Bolt (for external tools)
    environment:
      NEO4J_AUTH: neo4j/password123
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
      NEO4J_server_config_strict__validation_enabled: "false"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "echo 'RETURN 1' | cypher-shell -u neo4j -p password123"]
      interval: 15s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ── FastAPI アプリケーション ──
  app:
    build: .
    container_name: bunkyo-app
    env_file:
      - pipeline/.env
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: password123
    ports:
      - "8790:8790"
    volumes:
      - app_state:/app/graphrag/review
      - ./pipeline/step1_data:/app/pipeline/step1_data
    depends_on:
      neo4j:
        condition: service_healthy
    restart: unless-stopped

  # ── nginx リバースプロキシ（80 → 8790） ──
  nginx:
    image: nginx:alpine
    container_name: bunkyo-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
    restart: unless-stopped

volumes:
  neo4j_data:
  neo4j_logs:
  app_state: